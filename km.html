<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,600;1,300&display=swap');

/* Note: Futura is often a local font; 'Century Gothic' or 'Trebuchet MS' are common web-safe fallbacks */
body { margin: 0; padding: 0; background-color: #ffffff; }

.header-box {
    background-color: #fff5d6;
    padding: 15px 20px;
    width: 100%;
}

.german-name {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 1.4rem;
    display: block;
}

.latin-name {
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    font-style: italic;
    font-size: 1.1rem;
    color: #444;
}

.info-box {
    padding: 20px;
    font-family: 'Futura Lt BT', 'Century Gothic', sans-serif;
    font-weight: 300;
    font-style: light;
    color: #333;
    line-height: 1.6;
}

.custom-player {
  display: flex;
  align-items: center;
  background: #222; /* Dark background */
  padding: 10px;
  border-radius: 8px;
  gap: 10px;
}

.progress-container {
  flex-grow: 1;
  height: 8px;
  background: #444; /* Grey background track */
  cursor: pointer;
  position: relative;
}

#progressBar {
  width: 0%;
  height: 100%;
  background: #000; /* YOUR BLACK LOADING BAR */
  border: 1px solid #555;
}

#playBtn {
  background: none;
  border: none;
  color: white;
  cursor: pointer;
}
    </style>
</head>
<body>
    <div class="header-box">
    <span class="german-name">Kohlmeise</span>
    <span class="latin-name">Parus major</span>
</div>
<div class="info-box">
  <div class="custom-player">
  <button id="playBtn">▶</button>
  <div class="progress-container">
    <div id="progressBar"></div>
  </div>
  <audio id="myAudio" src="audio/km.mp3"></audio>
</div>
   <p>xeno-canto.org (XC707385)<br>
    Sonothèque ADVL<br>
    Genêts, Manche, Normandie, France
    </p> 
</div>
    </body>
</html>
