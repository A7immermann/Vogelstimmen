<!DOCTYPE html>
<html>
<head>
   <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='16.5' fill='%23e50069'/></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;600&family=Poppins:ital,wght@0,600;1,300&display=swap');

/* Note: Futura is often a local font; 'Century Gothic' or 'Trebuchet MS' are common web-safe fallbacks */
body { margin: 0; padding: 0; background-color: #ffffff; }

.header-box {
    background-color: #fff5d6;
    padding: 15px 20px;
    width: 100%;
}

.german-name {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 1.4rem;
    display: block;
}

.latin-name {
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    font-style: italic;
    font-size: 1.1rem;
    color: #444;
}

.info-box {
    padding: 20px;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-style: light;
    color: #333;
    line-height: 1.6;
}

.custom-player {
  display: flex;
  align-items: center;
  background: transparent;
  padding: 10px 10px 10px 0;
  border-radius: 8px;
  gap: 10px;
}

.progress-container {
  flex-grow: 1;
  height: 3.5px;
  background: #fff5d6;
  cursor: pointer;
  position: relative;
  border-radius: 4px;
  /* invisible padding for easy clicks*/
  padding: 10px 0; 
  background-clip: content-box; 
}

.progress-container::after {
  content: "";
  position: absolute;
  top: 10px;
  left: 0;
  right: 0;
  bottom: 10px;
  border: .5px solid black;
  border-radius: 4px;
  pointer-events: none;
}

#progressBar {
  width: 0%;
  height: 100%;
  background: #000;
    border-radius: 4px;
  
}

#playBtn {
  background: none;
  border: none;
  color: black;
  cursor: pointer;
  margin-left: -4px;
  width: 10px;
  display: flex;
  justify-content: flex-start;
  padding: 0;
 }

.visualizer-container {
  width: 100%;
  height: 80px;
  margin-bottom: 15px;
  overflow: visible; /* Allows the curve to breathe */
}

.vis-bar {
  background-color: #fff5d6;
  border: 0.5px solid #000;
  width: 3.5px;
  height: 0;
  opacity: 0; /* Ensures they stay hidden at start */
  border-radius: 4px 4px 0 0;
  transition: height 0.08s ease, opacity 0.2s ease;
  box-sizing: border-box;
}
    </style>
    <script src="../script.js" defer></script>
</head>
<body>
    <div class="header-box">
    <span class="german-name">Kohlmeise</span>
    <span class="latin-name">Parus major</span>
</div>
<div class="info-box">
  <div class="visualizer-container" id="visualizer">
  </div>
  <div class="custom-player">
  <button id="playBtn">▶</button>
  <div class="progress-container">
    <div id="progressBar"></div>
  </div>
  <audio id="myAudio" src="../audio/km.mp3" crossorigin="anonymous"></audio>
</div>
   <p>xeno-canto.org (XC707385)<br>
    Sonothèque ADVL<br>
    Genêts, Manche, Normandie, France test
    </p> 
</div>
    </body>
</html>
