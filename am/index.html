
<!DOCTYPE html>

<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='30' fill='%23fff5d6'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-family='sans-serif' font-size='60' fill='black'>♫</text></svg>">

<style>

@import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;600&family=Poppins:ital,wght@0,600;1,300&display=swap');

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    width: 100%;
    position: relative;
    /* This stops the 'rubber-band' effect on tablets */
    overscroll-behavior: none; 
    /* Extra insurance to prevent vertical bounce */
    height: 100%;


.header-box {
    background-color: #fff5d6;
    padding: 15px 20px;
    width: 100%;
    max-width: 100vw;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    overflow: visible !important;

}

.name-stack {
    display: flex;
    flex-direction: column;
}

.menu-container {
    position: relative;
    display: inline-block;
}

.menu-btn {
    background: none;
    border: none;
    padding: 5px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 4px;
    touch-action: manipulation;
}

.menu-line {
    width: 30px;
    height: 4px;
    background-color: white;
    border: 0.5px solid black;
    border-radius: 2px;
}

.dropdown-content {
    display: none;
    position: absolute;
    right: 0;
    top: 40px;
    background-color: white;
    min-width: 200px;
    border: 0.5px solid black;
    z-index: 1000;
    font-family: 'Jost', sans-serif;
    box-shadow: 0px 8px 16px rgba(0,0,0,0.1); 
display: block;
    transition: all 0.2s ease; /* Smooths the growing effect */
    transform-origin: left;    /* Grows from the left side */
}

/* Laptop Hover & Mobile Active State */
.dropdown-content a:hover, 
.dropdown-content a:active {
    background-color: #fff5d6; /* Matches your header yellow */
    padding-left: 25px;        /* Shifts text right slightly */
    font-weight: 600;          /* Makes text bolder */
    letter-spacing: 0.5px;
}


/* This is the magic part that actually makes it appear */
.dropdown-content.show {
    display: block !important;
}

.dropdown-content a {
    color: black;
    padding: 7px 16px;
    text-decoration: none;
    display: block;
    border-bottom: 0.5px solid black;
}

.dropdown-content a:last-child {
    border-bottom: none;
}

.dropdown-content.show {
    display: block;
}


.german-name { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 1.4rem; display: block; }

.latin-name { font-family: 'Poppins', sans-serif; font-weight: 300; font-style: italic; font-size: 1.1rem; color: #444; }


.info-box {

padding: 20px;

font-family: 'Jost', sans-serif;

font-weight: 300;

color: #333;

line-height: 1.6;
width: 100%;
    max-width: 100vw;

}


.custom-player {
    display: flex;
    /* This ensures the button and the track area sit on the same 'floor' */
    align-items: flex-end; 
    gap: 15px;
    width: 100%;
    box-sizing: border-box;
    margin-bottom: 25px;
    }

.player-track-area {

display: flex;

flex-direction: column;

flex-grow: 1; /* Takes up all available space */

min-width: 0; /* Critical for preventing flex-items from overflowing */

}


.progress-container {
    width: 100%;
    height: 24px; 
    cursor: pointer;
    position: relative;
    background-color: #fff5d6; 
    background-clip: content-box; 
    padding: 10px 0;
    
    /* Mobile protections */
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
}

#progressBar {
    width: 0%;
    /* This now fills the 4px space left inside the padding */
    height: 100%; 
    background: #000;
    border-radius: 4px;
}

/* Update the black border to match the new height */
.progress-container::after {
    content: "";
    position: absolute;
    /* These match your padding to frame the 4px track */
    top: 10px; 
    bottom: 10px;
    left: 0; 
    right: 0;
    border: 0.5px solid black;
    border-radius: 4px;
    pointer-events: none;
}


#playBtn {
    background: none;
    border: none;
    padding: 0;
    width: 28px;  
    height: 28px; 
    display: flex;
    align-items: center; 
    justify-content: flex-start; 
    cursor: pointer;
    -webkit-tap-highlight-color: transparent; 
    -webkit-user-select: none;
    user-select: none;
    outline: none;
    touch-action: manipulation;
}


.visualizer-container {
    width: 100%;
    height: 30px;
    margin: 0;
    display: block;
    /* This acts as your clipping mask */
    overflow: hidden; 
    position: relative;
}

.visualizer-container svg {
    display: block;
    /* Make it wider than the container to hide the jumping ends */
    width: 104%; 
    height: 100%;
    /* Center it so 2% is cut off on the left and 2% on the right */
    position: absolute;
    left: -2%; 
    overflow: visible;
}


</style>

<script src="../script.js" defer></script>

</head>

<body>

<div class="header-box">
<div class="name-stack">
<span class="german-name">Amsel</span>

<span class="latin-name">Turdus merula</span>
</div>
<div class="menu-container">
    <button class="menu-btn" id="menuBtn">
        <div class="menu-line"></div>
        <div class="menu-line"></div>
        <div class="menu-line"></div>
    </button>
    <div class="dropdown-content" id="dropdownMenu">
    <a href="../am/">Amsel</a>
    <a href="../bm/">Blaumeise</a>
    <a href="../bf/">Buchfink</a>
    <a href="../hrs/">Hausrotschwanz</a>
    <a href="../kb/">Kleiber</a>
    <a href="../km/">Kohlmeise</a>
    <a href="../mgm/">Mönchsgrasmücke</a>
    <a href="../rk/">Rotkehlchen</a>
    <a href="../st/">Star</a>
    <a href="../zk/">Zaunkönig</a>
</div>
</div>

</div>

<div class="info-box">

<div class="custom-player">

<button id="playBtn">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="black" style="display:block;">
        <path d="M5 5v14l15-7z" stroke="black" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
</button>

<div class="player-track-area">

<div class="visualizer-container" id="visualizer"></div>

<div class="progress-container">

<div id="progressBar"></div>

</div>

</div>

<audio id="myAudio" src="../audio/am.mp3" preload="metadata"></audio>

</div>

<p>bla8 xeno-canto.org (XC670887)<br>Z. D.<br>Burley, Hampshire, England, United Kingdom</p>

</div>

</body>

</html>
